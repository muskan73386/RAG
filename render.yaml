services:
  - type: web
    name: rag-chat-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDirectory: backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
